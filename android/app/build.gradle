plugins {
    id "com.android.application"
    id "kotlin-android"  // FIXED: Removed "apply plugin:" prefix
    id "com.google.gms.google-services"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = '1.0.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.arina.cav"
    compileSdk 36
    ndkVersion "29.0.13113456"

    compileOptions {
    sourceCompatibility JavaVersion.VERSION_21  
    targetCompatibility JavaVersion.VERSION_21  
    coreLibraryDesugaringEnabled true
}

    kotlinOptions {
    jvmTarget = '21'  
    languageVersion = '2.1'
    apiVersion = '2.1'
    freeCompilerArgs += [
        '-Xjvm-default=all',
        '-Xopt-in=kotlin.RequiresOptIn'
    ]
}

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.arina.cav"
        minSdkVersion 23
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            debuggable false
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            
            ndk {
                debugSymbolLevel 'FULL'
            }
            packagingOptions {
                jniLibs {
                    keepDebugSymbols += '**/*.so'
                }
            }
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

// Add this configuration block to resolve dependency conflicts
configurations.all {
    resolutionStrategy {
        // Force consistent versions and remove duplicates
        force 'com.google.android.play:app-update:2.1.0'
        force 'com.google.android.play:app-update-ktx:2.1.0'
        force 'com.google.android.play:review:2.0.2'
        force 'com.google.android.play:review-ktx:2.0.2'
        force 'com.google.android.play:core-common:2.0.4'
        force "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"        // CHANGED: 2.0.0 → 1.9.0
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0"   // CHANGED: 2.0.0 → 1.9.0
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0"   // CHANGED: 2.0.0 → 1.9.0
    }
}

allprojects {
    gradle.projectsEvaluated {
        tasks.withType(JavaCompile) {
            options.compilerArgs << "-Xlint:-options"
        }
    }
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.window:window:1.5.0'
    implementation 'androidx.window:window-java:1.5.0'
    implementation 'com.applovin:applovin-sdk:13.5.0'
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.0"
    implementation "org.jetbrains.kotlin:kotlin-reflect"  // ⭐ Let root handle version
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8"  // ⭐ Let root handle version
    implementation 'androidx.core:core-ktx:1.12.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'com.google.android.material:material:1.13.0'
    implementation 'androidx.media:media:1.6.0'
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.exoplayer:extension-mediasession:2.19.1'
    implementation 'com.google.android.gms:play-services-ads:22.6.0'
    

    implementation 'com.google.android.play:review:2.0.2'
    
}


flutter {
    source '../..'
}